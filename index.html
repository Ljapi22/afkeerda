<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="favicon.png">
<title>EcoTech – Aktivnosti i kontakt</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>
(function(){
    emailjs.init("OMx2mDU3yh2GJYjSr");
})();
</script>

<style>
body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background:#e0f0ff;
    padding-left:50px;
}

.navbar{
    position:sticky;
    top:0;
    z-index:1000;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 30px;
}

.nav-logo img{
    height:40px;
}

.nav-links{
    list-style:none;
    display:flex;
    gap:20px;
    margin:0;
    padding:0;
}

.nav-links a{
    color:white;
    text-decoration:none;
    font-weight:500;
}

.nav-links a:hover{text-decoration:underline;}

header{
    background:linear-gradient(135deg,#f97316,#ffb347);
    color:white;
    padding:70px 20px;
    text-align:center;
}

section{
    max-width:1100px;
    margin:auto;
    padding:60px 20px;
}

h2{color:#f97316;margin-bottom:30px;}

.aktivnost{
    background:white;
    padding:25px;
    border-radius:14px;
    margin-bottom:30px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    display:grid;
    grid-template-columns:320px 1fr;
    gap:30px;
    transition:0.3s;
}

.aktivnost:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.aktivnost h3{margin-top:0;color:#f97316;}
.tekst p{line-height:1.6;margin-bottom:12px;}

.slider{
    position:relative;
    width:100%;
    height:220px;
    overflow:hidden;
    border-radius:12px;
}

.slider img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
}

.slider img.active{display:block;}

.slider button{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(0,0,0,0.5);
    color:white;
    border:none;
    font-size:22px;
    padding:6px 12px;
    cursor:pointer;
}

.slider .prev{left:8px;}
.slider .next{right:8px;}

#kontakt{background:#ff7a2f;}

#kontakt form{
    background:white;
    padding:30px;
    border-radius:12px;
    max-width:500px;
    margin:auto;
}

#kontakt input,#kontakt textarea{
    width:100%;
    padding:10px;
    margin-bottom:15px;
}

#kontakt input[type="submit"]{
    background:#f97316;
    color:white;
    border:none;
    cursor:pointer;
}

#emailStatus{
    text-align:center;
    font-size:18px;
    font-weight:bold;
    display:none;
}

footer{
    background:#0f172a;
    color:white;
    text-align:center;
    padding:25px 15px;
    font-size:14px;
}
</style>
</head>

<body>

<nav class="navbar">
    <div class="nav-logo">
        <img src="download.png" alt="HydroTech logo">
    </div>
    <ul class="nav-links">
        <li><a href="#aktivnosti">Aktivnosti</a></li>
        <li><a href="#kontakt">Kontakt</a></li>
    </ul>
</nav>

<header>
    <h1>HydroTech Aktivnosti</h1>
    <p>Praćenje aktivnosti i kontakt forma</p>
</header>

<section id="aktivnosti">
    <h2>Aktivnosti firme</h2>
    <div id="aktivnostiContainer"></div>
</section>

<section id="kontakt">
    <h2 style="text-align:center;color:white">Kontaktirajte nas</h2>
    <form id="contact-form">
        <input type="hidden" name="contact_number">
        <input type="text" name="user_name" placeholder="Ime i prezime" required>
        <input type="email" name="user_email" placeholder="Email" required>
        <textarea name="message" placeholder="Poruka" required></textarea>
        <input type="submit" value="Pošalji">
    </form>
    <p id="emailStatus"></p>
</section>

<footer>
    © <span id="year"></span> Afan i Erdin<br>
    JU Srednja ekonomska škola, Sarajevo
</footer>

<script>
document.getElementById("year").innerText = new Date().getFullYear();
</script>

<script>
window.onload = function(){
    const status = document.getElementById("emailStatus");
    document.getElementById("contact-form").addEventListener("submit", function(e){
        e.preventDefault();
        this.contact_number.value = Math.random()*100000|0;
        emailjs.sendForm("service_b5qpu19","template_2t3wr1y",this)
        .then(()=>{status.style.display="block";status.style.color="lime";status.innerHTML="✅ Email uspješno poslan!";this.reset();},
              ()=>{status.style.display="block";status.style.color="red";status.innerHTML="❌ Greška pri slanju."});
    });
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBAoOT2t4XjP15fxS8Wv6RIZ0Bu4FDMxPs",
    authDomain: "ljapi-cf5d4.firebaseapp.com",
    projectId: "ljapi-cf5d4",
    storageBucket: "ljapi-cf5d4.firebasestorage.app",
    messagingSenderId: "137660401007",
    appId: "1:137660401007:web:23ab6f0784381b4974549a",
    measurementId: "G-ZQEMMBYJDT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("aktivnostiContainer");

function createHTML(data){
    const imgs = (data.slike||[]).map((u,i)=>`<img src="${u}" class="${i==0?'active':''}">`).join("");
    const txt = (data.tekst||[]).map(p=>`<p>${p}</p>`).join("");
    return `
    <div class="aktivnost">
        <div class="slider">
            ${imgs}
            <button class="prev">‹</button>
            <button class="next">›</button>
        </div>
        <div class="tekst">
            <h3>${data.naslov}</h3>
            ${txt}
        </div>
    </div>`;
}

function initSliders(){
    document.querySelectorAll(".slider").forEach(sl=>{
        const imgs = sl.querySelectorAll("img");
        let i=0;
        sl.querySelector(".next").onclick=()=>{i=(i+1)%imgs.length;show();}
        sl.querySelector(".prev").onclick=()=>{i=(i-1+imgs.length)%imgs.length;show();}
        function show(){imgs.forEach(im=>im.classList.remove("active"));imgs[i].classList.add("active");}
    });
}

async function load(){
    const snap = await getDocs(collection(db,"aktivnosti"));
    snap.forEach(d=>{
        container.innerHTML+=createHTML(d.data());
    });
    initSliders();
}
load();
</script>

</body>
</html>
